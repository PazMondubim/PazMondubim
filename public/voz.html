<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA de Voz | Paz Mondubim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0f172a, #020617);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .pulse-ring {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 2px solid #6366f1;
            opacity: 0;
            pointer-events: none;
        }

        .active .pulse-ring {
            animation: ring-pulse 2s infinite;
        }

        @keyframes ring-pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .orb {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        .orb:hover {
            transform: scale(1.05);
        }

        .orb.listening {
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            animation: breathing 2s infinite ease-in-out;
        }

        .orb.thinking {
            filter: hue-rotate(90deg);
            animation: rotate-orb 1s infinite linear;
        }

        @keyframes breathing {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 50px rgba(244, 63, 94, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 80px rgba(236, 72, 153, 0.6);
            }
        }

        @keyframes rotate-orb {
            from {
                transform: rotate(0deg) scale(1);
            }

            to {
                transform: rotate(360deg) scale(0.95);
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .bars-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
            margin: 20px 0;
        }

        .bar {
            width: 4px;
            height: 10px;
            background: #818cf8;
            border-radius: 4px;
            transition: height 0.1s ease;
        }

        .debug-panel {
            font-size: 10px;
            font-family: monospace;
            opacity: 0.3;
            margin-top: 2rem;
            max-height: 50px;
            overflow: hidden;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="glass shadow-2xl">
        <h1 class="text-3xl font-bold mb-2">Paz Voice AI</h1>
        <p class="text-indigo-300 text-sm mb-8">Conselheiro Pastoral Mondubim</p>

        <div class="relative flex items-center justify-center mb-10" id="orbContainer">
            <div class="pulse-ring"></div>
            <div id="orb" class="orb" onclick="toggleAI()">
                <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </div>
        </div>

        <div id="status" class="text-xl font-medium min-h-[1.5em] mb-2">Toque para ouvir</div>
        <div id="transcript" class="text-gray-400 text-sm italic min-h-[3em]">Clique no ícone e diga algo...</div>

        <div class="bars-container" id="visualizer">
            <!-- 10 bars -->
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="debug-panel" id="debug">System ready...</div>
    </div>

    <script>
        const orb = document.getElementById('orb');
        const orbContainer = document.getElementById('orbContainer');
        const statusText = document.getElementById('status');
        const transText = document.getElementById('transcript');
        const debugText = document.getElementById('debug');
        const bars = document.querySelectorAll('.bar');

        let isActive = false;
        let isSpeaking = false;
        let recognition;
        let synth = window.speechSynthesis;
        const cid = new URLSearchParams(window.location.search).get('cid') || 'user';

        function log(msg) {
            console.log(msg);
            debugText.innerText = msg;
        }

        // Init Speech Recognition
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false; // Only one phrase at a time per turn
            recognition.interimResults = false; // Easier logic
            recognition.lang = 'pt-BR';

            recognition.onstart = () => {
                log("Reconhecimento iniciado...");
                orb.classList.add('listening');
                orbContainer.classList.add('active');
                statusText.innerText = "IA Ouvindo...";
                transText.innerText = "Diga sua dúvida ou pedido de oração";
            };

            recognition.onerror = (e) => {
                log("Erro: " + e.error);
                stopAll();
                if (e.error === 'not-allowed') alert("Permita o microfone para conversar!");
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                log("Capturado: " + text);
                transText.innerText = `"${text}"`;
                processVoice(text);
            };

            recognition.onend = () => {
                log("Reconhecimento finalizado");
                if (isActive && !isSpeaking) {
                    orb.classList.remove('listening');
                    orbContainer.classList.remove('active');
                    // We don't restart here, we let the processVoice decide
                }
            };
        } else {
            alert("Navegador não suportado. Use Chrome ou Edge.");
        }

        async function toggleAI() {
            if (!isActive) {
                isActive = true;
                startListening();
            } else {
                stopAll();
            }
        }

        function startListening() {
            if (isSpeaking) synth.cancel();
            isSpeaking = false;
            try {
                recognition.start();
            } catch (e) {
                log("Erro start: " + e.message);
            }
        }

        function stopAll() {
            isActive = false;
            isSpeaking = false;
            recognition.stop();
            synth.cancel();
            orb.className = 'orb';
            orbContainer.classList.remove('active');
            statusText.innerText = "Toque para ouvir";
            transText.innerText = "Interação resetada.";
            bars.forEach(b => b.style.height = '10px');
            log("Processo parado.");
        }

        async function processVoice(text) {
            orb.className = 'orb thinking';
            statusText.innerText = "Pensando...";

            try {
                const response = await fetch('/api/voice-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, cid })
                });

                if (!response.ok) throw new Error("Erro servidor: " + response.status);

                const data = await response.json();
                log("Resposta recebida do servidor");
                speak(data.response);
            } catch (err) {
                log("Erro no processamento: " + err.message);
                speak("Desculpe, tive um problema de conexão. Pode repetir?");
            }
        }

        async function speak(text) {
            isSpeaking = true;
            orb.className = 'orb'; // Clear other modes
            statusText.innerText = "IA Falando...";
            transText.innerText = text;
            log("Gerando voz pastoral...");

            try {
                // Remove qualquer áudio tocando
                if (window.currentAudio) {
                    window.currentAudio.pause();
                    window.currentAudio = null;
                }

                const audioUrl = `/api/tts?text=${encodeURIComponent(text)}`;
                const audio = new Audio(audioUrl);
                window.currentAudio = audio;

                audio.onplay = () => {
                    log("Iniciou fala neural");
                    animateBars();
                };

                audio.onended = () => {
                    log("Terminou fala neural");
                    isSpeaking = false;
                    if (isActive) {
                        setTimeout(() => {
                            if (isActive && !isSpeaking) startListening();
                        }, 500);
                    }
                };

                audio.onerror = (e) => {
                    log("Erro áudio neural. Usando voz do sistema...");
                    fallbackSpeak(text);
                };

                await audio.play();
            } catch (err) {
                log("Erro ao tocar áudio: " + err.message);
                fallbackSpeak(text);
            }
        }

        function fallbackSpeak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.onstart = () => animateBars();
            utterance.onend = () => {
                isSpeaking = false;
                if (isActive) setTimeout(startListening, 500);
            };
            synth.speak(utterance);
        }

        function animateBars() {
            if (!isSpeaking) {
                bars.forEach(b => b.style.height = '10px');
                return;
            }
            bars.forEach(bar => {
                const height = Math.random() * 30 + 5;
                bar.style.height = `${height}px`;
            });
            setTimeout(animateBars, 100);
        }

        // Pre-load voices
        synth.getVoices();
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = () => synth.getVoices();
        }
    </script>
</body>

</html>
